# Cloudflare Pages Configuration
# https://developers.cloudflare.com/pages/configuration/

[build]
  # No build command - static site
  command = "echo 'Static site, no build needed'"
  publish = "."

[functions]
  # Directory containing Pages Functions
  directory = "functions"

